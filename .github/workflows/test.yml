name: Run Pytest for Lab 6

on:
  push:
    paths:
      - 'lab_6.py'
      - 'test_lab_6.py'
      - 'requirements.txt'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'lab_6.py'
      - 'test_lab_6.py'

jobs:
  test-lab6:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run pytest for Lab 6
      run: |
        pytest test_lab_6.py -v